<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shadowself</title>
  <meta
    name="description"
    content="Shadowself is a dark little creative hub for AI-assisted media, games, software, and experiments."
  >
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/data/site-data.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body class="page page-home" data-page="home">
  <div class="site-shell">
    <header class="home-hero">
      <div class="hero-side hero-side-left">
        <button class="hero-art-control" type="button" data-open-modal="ai-disclosure-modal" aria-label="AI Disclosure">
          <img class="hero-side-art" src="assets/images/site/ai-disclosure-button-alpha.svg" alt="">
        </button>
      </div>

      <div class="hero-center">
        <a class="logo-lockup" href="index.html" aria-label="Shadowself home">
          <img class="logo-art" src="assets/logos/shadowself-logo-web.png" alt="Shadowself logo image">
        </a>
        <p class="hero-lede">
          AI-assisted video, salvaged audio, playable experiments, and whatever else crawls out of the lab next.
        </p>
      </div>

      <div class="hero-side hero-side-right">
        <a class="hero-art-link" href="updates.html" aria-label="Updates and brainfarts">
          <img class="hero-side-art" src="assets/images/site/updates-brainfarts-button-alpha.svg" alt="">
        </a>
      </div>
    </header>

    <main class="home-main">
      <section class="split-tiles" aria-label="Primary sections">
        <a class="entry-tile" href="media.html">
          <img class="entry-tile-art-image" src="assets/images/site/media-tile-alpha.svg" alt="Media section artwork">
        </a>

        <a class="entry-tile" href="games-software.html">
          <img class="entry-tile-art-image" src="assets/images/site/games-software-tile-alpha.svg" alt="Games and software section artwork">
        </a>
      </section>
    </main>
  </div>
</body>
</html>
