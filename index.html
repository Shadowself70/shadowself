<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shadowself</title>
  <meta
    name="description"
    content="Shadowself is a dark little creative hub for AI-assisted media, games, software, and experiments."
  >
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/data/site-data.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body class="page page-home" data-page="home">
  <div class="site-shell">
    <header class="home-hero">
      <div class="hero-center">
        <a class="logo-lockup" href="index.html" aria-label="Shadowself home">
          <img class="logo-art" src="assets/logos/shadowself-logo-web.png" alt="Shadowself logo image">
        </a>
        <p class="hero-lede">
          AI-assisted video, salvaged audio, playable experiments, and whatever else crawls out of the lab next.
        </p>
        <div class="home-nav-row" aria-label="Primary navigation and site links">
          <button class="home-nav-control" type="button" data-open-modal="ai-disclosure-modal" aria-label="AI Disclosure">
            <img class="home-nav-art" src="assets/images/site/ai-disclosure-button-alpha.svg" alt="">
          </button>
          <a class="home-nav-link home-nav-link-section" href="media.html" aria-label="Media">
            <img class="home-nav-art home-nav-art-section" src="assets/logos/media-logo-medium-web.png" alt="Media">
          </a>
          <a class="home-nav-link home-nav-link-section" href="games-software.html" aria-label="Games and software">
            <img class="home-nav-art home-nav-art-section" src="assets/logos/games-software-logo-medium-web.png" alt="Games and software">
          </a>
          <a class="home-nav-link" href="updates.html" aria-label="Updates and brainfarts">
            <img class="home-nav-art" src="assets/images/site/updates-brainfarts-button-alpha.svg" alt="">

    </header>
