<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // --- Grab global libraries from the window ---
        const { useState, useRef, useEffect, useCallback, useMemo } = React;
        const THREE = window.THREE;
        
        // --- CONFIGURATION AND DATA ---
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 900;
        // --- UPDATED: More steps for a full color cycle ---
        const COLOR_TRANSITION_STEPS = 50000; 

        const GEAR_DATA = {
            Rings: {
                "Ring 150 (Large, Circle)": 150, "Ring 144 (Large, Circle)": 144,
                "Ring 105 (Medium, Circle)": 105, "Ring 96 (Medium, Circle)": 96,

                "Wheel 60 (Medium, Circle)": {r: 60, holes: [8, 16, 24, 32, 40, 48, 56]},
                "Wheel 52 (Medium, Circle)": {r: 52, holes: [5, 10, 15, 20, 25, 30, 35, 40, 45]},
                "Wheel 48 (Small, Circle)": {r: 48, holes: [4, 8, 12, 16, 20, 24, 28, 32, 36]},
                "Wheel 40 (Small, Circle)": {r: 40, holes: [4, 8, 12, 16, 20, 24, 28, 32]},
                "Wheel 30 (X-Small, Circle)": {r: 30, holes: [3, 6, 9, 12, 15, 18, 21, 24, 27]},
            },
            Special: {
                "Ring (Oblong, A=84/B=63)": {type: "oblong", A: 84, B: 63},
                "Ring (Triangle, 120-side)": {type: "polygon", sides: 3, side_length: 120},
            }
        };

        const COLOR_SCHEMES = {
            "Solid (Manual)": {type: "solid"},
            "Rainbow": {type: "hsv_sweep"},
            "Cyan & Gray": {type: "palette_sweep", colors: ["#00FFFF", "#606060"]},
            "Red & Gray": {type: "palette_sweep", colors: ["#FF4040", "#707070"]},
            "Green & Purple": {type: "palette_sweep", colors: ["#00FF80", "#8000FF"]},
            "Yellow & Navy": {type: "palette_sweep", colors: ["#FFFF00", "#000080"]},
            "Fire (Red/Yellow)": {type: "palette_sweep", colors: ["#FF0000", "#FFD700", "#FF4500"]},
            "Ocean (Blue/Cyan)": {type: "palette_sweep", colors: ["#0000FF", "#00FFFF", "#008080"]},
            "Forrest (Green/Brown)": {type: "palette_sweep", colors: ["#008000", "#8B4513", "#228B22"]}
        };

        const THEMES = {
            light: {
                bg: "#F7FAFC", fg: "#2D3748", canvas_bg: "#FFFFFF",
                btn_bg: "bg-gradient-to-r from-teal-400 to-cyan-400", 
                btn_fg: "#1A202C", 
                success_bg: "bg-gradient-to-r from-green-500 to-emerald-500",
                danger_bg: "bg-gradient-to-r from-red-500 to-rose-500", 
                trough: "#EDF2F7", accent: "#319795",
                modal_bg: "rgba(255, 255, 255, 0.9)"
            },
            dark: {
                bg: "#1A202C", fg: "#E0E0E0", canvas_bg: "#121212",
                btn_bg: "bg-gradient-to-r from-teal-600 to-cyan-600", 
                btn_fg: "#FFFFFF", 
                success_bg: "bg-gradient-to-r from-green-600 to-emerald-600",
                danger_bg: "bg-gradient-to-r from-red-600 to-rose-600", 
                trough: "#2D3748", accent: "#81E6D9",
                modal_bg: "rgba(26, 32, 44, 0.9)"
            }
        };
        
        // --- MATH UTILITIES ---
        const gcd = (a, b) => {
            while (b) { [a, b] = [b, a % b]; }
            return a;
        };
        const lcm = (a, b) => {
            if (a === 0 || b === 0) return 0;
            return Math.abs(a * b) / gcd(a, b);
        };
        const hexToRgb = (hex) => {
            hex = hex.replace(/^#/, '');
            if (hex.length === 3) hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return [r, g, b];
        };
        const rgbToHex = (r, g, b) => {
            const toHex = (c) => Math.round(c).toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        };
        const hsvToRgb = (h, s, v) => {
            let r, g, b;
            let i = Math.floor(h * 6);
            let f = h * 6 - i;
            let p = v * (1 - s);
            let q = v * (1 - f * s);
            let t = v * (1 - (1 - f) * s);
            switch (i % 6) {
                case 0: r = v; g = t; b = p; break;
                case 1: r = q; g = v; b = p; break;
                case 2: r = p; g = v; b = t; break;
                case 3: r = p; g = q; b = v; break;
                case 4: r = t; g = p; b = v; break;
                case 5: r = v; g = p; b = q; break;
                default: r = 0; g = 0; b = 0;
            }
            return [r * 255, g * 255, b * 255];
        };
        const hsvToHex = (h, s, v) => rgbToHex(...hsvToRgb(h, s, v));

        // --- NEW: Polygon Vertex Calculator ---
        const getPolygonVertices = (sides, sideLengthPx, startAngle = 0) => {
            const vertices = [];
            const apothem = (sideLengthPx / (2 * Math.tan(Math.PI / sides)));
            const circumRadius = apothem / Math.cos(Math.PI / sides);
            for (let i = 0; i < sides; i++) {
                const angle = startAngle + (i / sides) * 2 * Math.PI;
                const x = circumRadius * Math.cos(angle);
                const y = circumRadius * Math.sin(angle);
                vertices.push(new THREE.Vector3(x, y, 0));
            }
            return vertices;
        };

        // --- INSTRUCTION COMPONENT ---
        const HelpModal = ({ theme, onClose }) => {
            return (
                <div 
                    className="fixed inset-0 z-50 flex items-center justify-center p-4" 
                    style={{ backgroundColor: "rgba(0,0,0,0.5)" }}

                >
                    <div 
                        className="p-6 rounded-lg shadow-2xl max-w-lg w-full" 
                        style={{ backgroundColor: theme.modal_bg, color: theme.fg, border: `1px solid ${theme.trough}` }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-semibold">How to Use sPYrograph</h3>
                            <button
                                className={`w-8 h-8 rounded-full flex items-center justify-center text-lg font-bold transform transition-transform hover:scale-110 ${theme.btn_bg}`}
                                style={{ color: theme.btn_fg }}
                                onClick={onClose}
                            >
                                &times;
                            </button>
                        </div>
                        <ul className="list-disc list-inside text-sm space-y-2">
                            <li><strong>Fixed Ring:</strong> Selects the large, stationary outer ring or special shape.</li>
                            <li><strong>Moving Wheel (r):</strong> Selects the smaller wheel that rolls along the fixed ring.</li>
                            <li><strong>Pen Hole (d):</strong> Selects the hole on the wheel. A smaller number is closer to the wheel's center.</li>
                            <li><strong>Pattern Info:</strong> Shows the complexity of the selected gears. "Petals" is the number of points the pattern will have.</li>
                            <li><strong>Animation Speed:</strong> Controls how fast the pattern is drawn.</li>
                            <li><strong>Color Scheme:</strong> Selects an automatic color pattern. "Solid (Manual)" enables the manual color picker.</li>
                            <li><strong>Roll Mode:</strong> "Inside" is classic Spirograph. "Outside" rolls the wheel on the outer edge of the ring.</li>
                            <li><strong>Export as PNG:</strong> Saves the current drawing on the canvas as a PNG image.</li>
                        </ul>
                    </div>
                </div>
            );
        };
        
        // --- INLINE SVG ICONS ---
        const Icons = {
            Gears: () => (
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z" />
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            ),
            Info: () => (
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            Animation: () => (
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            Actions: () => (
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            ),
            Color: () => (
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4H7zm0 0l-2 2m2-2v-2m2 2l2-2M7 16V6M7 6l2-2M7 6H5m2 10l2 2m-2-2v-2m2 2l-2-2m2-2l2 2m-2-2h2" />
                </svg>
            ),
            Settings: () => (
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z" />
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            ),
            Undo: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l5 5m-5-5l5-5" />
                </svg>
            )
        };

        // --- REACT COMPONENT ---
        const SpiroApp = () => {
            const canvasRef = useRef(null);
            const threeRef = useRef({
                scene: null, renderer: null, camera: null,
                outlineMaterial: null,
                drawGroup: new THREE.Group(), 
                outlineGroup: new THREE.Group(), 
            });
            const drawState = useRef({
                currentStep: 0, t: 0, dt: 0,
                penAngle: 0, lastRollCenterX: 0, lastRollCenterY: 0,
                poly: { state: 'rolling_edge', currentEdge: 0, distOnEdge: 0, edgeLength: 0, cornerAngle: 0, pivotCenter: null, vertices: [] }
            });
            const colorState = useRef({
                currentRgb: hexToRgb("#00FFFF"), targetRgb: hexToRgb("#00FFFF"),
                paletteIndex: 0, currentHue: 0, targetHue: 0.5
            });
            
            const drawHistoryRef = useRef([]); 
            const currentDrawOperationRef = useRef(null); 
            
            const allPointsRef = useRef([]); 
            const allColorsRef = useRef([]); 

            const animationFrameId = useRef(null);
            const colorTransitionTimer = useRef(null);

            // --- STATE ---
            const [themeName, setThemeName] = useState('dark');
            const theme = useMemo(() => THEMES[themeName], [themeName]);
            const [R, setR] = useState(105);
            const [r, setRWheel] = useState(52);
            const [d, setD] = useState(35);
            const [ringType, setRingType] = useState('circle');
            const [rMinor, setRMinor] = useState(0); 
            const [selectedRing, setSelectedRing] = useState("Ring 105 (Medium, Circle)");
            const [selectedWheel, setSelectedWheel] = useState("Wheel 52 (Medium, Circle)");
            const [selectedHole, setSelectedHole] = useState(35);
            const [isDrawing, setIsDrawing] = useState(false);
            const [maxSteps, setMaxSteps] = useState(0);
            const [speedLevel, setSpeedLevel] = useState(1); 
            const [selectedScheme, setSelectedScheme] = useState("Solid (Manual)");
            const [penColor, setPenColor] = useState("#00FFFF"); 
            
            const [showHelp, setShowHelp] = useState(false);
            const [patternInfo, setPatternInfo] = useState({ petals: 0, rotations: 0 });
            const [rollMode, setRollMode] = useState('hypo');
            
            const [canUndo, setCanUndo] = useState(false);
            
            const ringOptions = useMemo(() => [...Object.keys(GEAR_DATA.Rings), ...Object.keys(GEAR_DATA.Special)], []);
            const wheelOptions = useMemo(() => Object.keys(GEAR_DATA.Wheels), []);
            const availableHoles = useMemo(() => {
                const data = GEAR_DATA.Wheels[selectedWheel];
                return data ? data.holes : [];
            }, [selectedWheel]);

            const dynamicScaleFactor = useMemo(() => {
                const R_teeth = R;
                const r_teeth = r;
                const d_teeth = d;
                let max_teeth_radius = 150; 

                if (ringType === 'oblong') {
                    const A = R_teeth; 
                    const B = rMinor; 
                    if (rollMode === 'hypo') {
                        max_teeth_radius = Math.max(A, B);
                    } else { // epi
                        max_teeth_radius = Math.max(A, B) + r_teeth + d_teeth;
                    }
                } else if (ringType === 'polygon') {
                    const polyData = GEAR_DATA.Special[selectedRing];
                    // Check if polyData exists before accessing properties
                    if (polyData && polyData.sides) {
                        const sideLengthPx = polyData.side_length;
                        const apothem = (sideLengthPx / (2 * Math.tan(Math.PI / polyData.sides)));
                        const circumRadius = apothem / Math.cos(Math.PI / polyData.sides);
                        max_teeth_radius = circumRadius + r_teeth + d_teeth;
                    } else {
                        max_teeth_radius = 150; // Fallback
                    }
                } else { // Circle
                    if (rollMode === 'hypo') {
                        max_teeth_radius = R_teeth;
                    } else { // epi
                        max_teeth_radius = R_teeth + r_teeth + d_teeth;
                    }
                }
                
                if (max_teeth_radius <= 0) max_teeth_radius = 150; 
                
                return (CANVAS_WIDTH * 0.45) / max_teeth_radius; 
            }, [R, r, d, ringType, rollMode, rMinor, selectedRing]);

            // --- THREE.JS INITIALIZATION ---
            useEffect(() => {
                const mount = canvasRef.current;
                const T = threeRef.current; 

                T.scene = new THREE.Scene();
                T.camera = new THREE.OrthographicCamera(
                    -CANVAS_WIDTH / 2, CANVAS_WIDTH / 2,
                    CANVAS_HEIGHT / 2, -CANVAS_HEIGHT / 2,
                    0.1, 1000
                );
                T.camera.position.z = 10;

                T.renderer = new THREE.WebGLRenderer({
                    canvas: mount, antialias: true, alpha: false, preserveDrawingBuffer: true 
                });
                T.renderer.setSize(CANVAS_WIDTH, CANVAS_HEIGHT);
                T.renderer.setPixelRatio(window.devicePixelRatio);
                T.renderer.setClearColor(THEMES.dark.canvas_bg); 

                T.outlineMaterial = new THREE.LineDashedMaterial({ color: THEMES.dark.fg, linewidth: 1, scale: 1, dashSize: 5, gapSize: 5, transparent: true, opacity: 0.5 });
                
                T.scene.add(T.drawGroup);
                T.scene.add(T.outlineGroup);

                let frameId;
                const animate = () => {
                    frameId = requestAnimationFrame(animate);
                    T.renderer.render(T.scene, T.camera);
                };
                animate();

                // Cleanup
                return () => {
                    cancelAnimationFrame(frameId);
                    if (animationFrameId.current) cancelAnimationFrame(animationFrameId.current);
                    if (T.renderer) T.renderer.dispose();
                    if (T.outlineMaterial) T.outlineMaterial.dispose();
                    T.drawGroup.traverse(obj => obj.geometry?.dispose());
                    T.outlineGroup.traverse(obj => obj.geometry?.dispose());
                    T.scene.remove(T.drawGroup, T.outlineGroup);
                };
            }, []);

            // --- THEME & STYLE EFFECTS ---
            useEffect(() => {
                document.body.style.backgroundColor = theme.bg;
                const T = threeRef.current;
                if (T.renderer) T.renderer.setClearColor(theme.canvas_bg);
                if (T.outlineMaterial) T.outlineMaterial.color.set(theme.fg);
            }, [theme]);
            
            // --- MATH IMPLEMENTATION ---
            const calculateInitialSpiroPoint = useCallback((Rpx, Rrpx, Dpx, type, rMinorPxValue, poly) => {
                let x_coord, y_coord;
                const r_val = Rrpx, d_val = Dpx;

                if (type === "oblong") {
                    const A = Rpx;
                    x_coord = (A - r_val) + d_val; y_coord = 0;
                } else if (type === "polygon") {
                    if (!poly.vertices || !poly.vertices.length || r_val === 0) return null;
                    const v0 = poly.vertices[0];
                    const v1 = poly.vertices[1];
                    const edgeAngle = Math.atan2(v1.y - v0.y, v1.x - v0.x);
                    const center_x = v0.x - r_val * Math.sin(edgeAngle);
                    const center_y = v0.y + r_val * Math.cos(edgeAngle);
                    const wheelAngle = edgeAngle + Math.PI / 2;
                    const local_x = d_val * Math.cos(0); // penAngle is 0
                    const local_y = d_val * Math.sin(0); // penAngle is 0
                    x_coord = center_x + local_x * Math.cos(wheelAngle) - local_y * Math.sin(wheelAngle);
                    y_coord = center_y + local_x * Math.sin(wheelAngle) + local_y * Math.cos(wheelAngle);
                } else { // Circle
                    if (r_val === 0) return null;
                    const R_val = Rpx;
                    const R_op_r = (rollMode === 'hypo') ? (R_val - r_val) : (R_val + r_val);
                    const k = R_op_r / r_val;
                    const d_sign = (rollMode === 'hypo') ? -1 : 1;
                    
                    x_coord = R_op_r * Math.cos(0) + d_val * Math.cos(k * 0);
                    y_coord = R_op_r * Math.sin(0) + d_sign * d_val * Math.sin(k * 0);
                }
                return new THREE.Vector3(x_coord, y_coord, 0);
            }, [rollMode]);

            // --- START/STOP DRAWING ---
            const startDrawing = () => {
                if (animationFrameId.current) cancelAnimationFrame(animationFrameId.current);
                const T = threeRef.current;
                
                let tMax, numSteps;
                const R_teeth = R, r_teeth = r;
                
                const scaleFactor = dynamicScaleFactor;
                const Rpx = R_teeth * scaleFactor;
                const Rrpx = r_teeth * scaleFactor;
                const Dpx = d * scaleFactor;
                const rMinorPxValue = rMinor * scaleFactor;

                if (ringType === 'oblong') {
                    tMax = 40 * 2 * Math.PI; 
                    numSteps = 2000 * (tMax / (2 * Math.PI)); 
                } else if (ringType === 'polygon') {
                    tMax = 25000; // Step-based
                    numSteps = 25000;
                } else { // Circle
                    if (R_teeth === 0 || r_teeth === 0) { tMax = 0; numSteps = 0; }
                    else {
                        const commonDivisor = gcd(R_teeth, r_teeth);
                        const petals = R_teeth / commonDivisor;
                        const rotations = r_teeth / commonDivisor;
                        
                        // For a complete pattern, the wheel makes 'petals' rotations around the ring
                        // and the pen makes 'rotations' rotations around the wheel's center relative to the ring's center.
                        // The number of wheel rotations for the pattern to close is R_teeth / commonDivisor.
                        // So, the total angle traced by the center of the moving wheel is (R_teeth / commonDivisor) * 2 * PI.
                        tMax = 2 * Math.PI * (R_teeth / commonDivisor); 
                        numSteps = Math.max(500, 2000 * (tMax / (2 * Math.PI)));
                    }
                }
                
                numSteps = Math.ceil(numSteps);
                setMaxSteps(numSteps);
                
                T.outlineGroup.clear();
                
                const state = drawState.current;
                state.currentStep = 0;
                state.t = 0;
                state.dt = (numSteps > 0) ? tMax / numSteps : 0;
                state.penAngle = 0;
                
                // --- PRE-CALCULATION ---
                const allPoints = [];
                const allColors = [];
                
                const colorCalc = { ...colorState.current };
                const schemeData = COLOR_SCHEMES[selectedScheme];
                
                // Calculate color steps needed per point to complete a full cycle over the entire pattern
                let colorCycles = 2; // Number of times to cycle through the full rainbow/palette
                
                // Ensure the color progression is smooth and cycles a few times
                const totalColorSteps = COLOR_TRANSITION_STEPS * colorCycles;
                const colorStepsPerPoint = (schemeData.type !== 'solid' && numSteps > 0) ? (totalColorSteps / numSteps) : 1.0;
                
                let currentPenColor = new THREE.Color(penColor);
                if (schemeData.type !== 'solid') {
                    if (schemeData.type === 'hsv_sweep') {
                        colorCalc.currentHue = 0.0;
                        colorCalc.targetHue = 0.0; // Start and end at same hue
                    } else { // palette_sweep
                        colorCalc.paletteIndex = 0;
                        colorCalc.currentRgb = hexToRgb(schemeData.colors[0]);
                        colorCalc.targetRgb = hexToRgb(schemeData.colors[0]);
                    }
                    currentPenColor.set((schemeData.type === 'hsv_sweep') ? hsvToHex(colorCalc.currentHue, 0.9, 0.95) : rgbToHex(...colorCalc.currentRgb));
                }

                if (ringType === 'oblong') {
                    const R_op_r = (rollMode === 'hypo') ? (Rpx - Rrpx) : (Rpx + Rrpx);
                    state.lastRollCenterX = R_op_r;
                    state.lastRollCenterY = 0;
                } else if (ringType === 'polygon') {
                    const polyData = GEAR_DATA.Special[selectedRing];
                    const vertices = getPolygonVertices(polyData.sides, polyData.side_length * scaleFactor, -Math.PI / 2);
                    state.poly = {
                        state: 'rolling_edge', currentEdge: 0, distOnEdge: 0,
                        edgeLength: polyData.side_length * scaleFactor,
                        vertices: vertices,
                        cornerAngle: Math.PI - ((polyData.sides - 2) * Math.PI / polyData.sides),
                        pivotCenter: null
                    };
                }

                for (let i = 0; i <= numSteps; i++) {
                    let currentCoords = null;
                    
                    if (ringType === 'circle') {
                        if (Rrpx === 0) break;
                        const R_op_r = (rollMode === 'hypo') ? (Rpx - Rrpx) : (Rpx + Rrpx);
                        const k = (rollMode === 'hypo') ? (R_op_r / Rrpx) : (-R_op_r / Rrpx);
                        const d_sign = (rollMode === 'hypo') ? -1 : 1;
                        const t = i * state.dt;
                        
                        const center_x_rel = R_op_r * Math.cos(t);
                        const center_y_rel = R_op_r * Math.sin(t);
                        
                        const x_coord = center_x_rel + Dpx * Math.cos(k * t);
                        const y_coord = center_y_rel + d_sign * Dpx * Math.sin(k * t);
                        currentCoords = new THREE.Vector3(x_coord, y_coord, 0);
                    } else if (ringType === 'oblong') {
                        if (Rrpx === 0) break;
                        const A = Rpx;
                        const B = rMinorPxValue;
                        const R_op_r_A = (rollMode === 'hypo') ? (A - Rrpx) : (A + Rrpx);
                        const R_op_r_B = (rollMode === 'hypo') ? (B - Rrpx) : (B + Rrpx);
                        const d_sign = (rollMode === 'hypo') ? -1 : 1;
                        const t = i * state.dt;
                        const roll_center_x = R_op_r_A * Math.cos(t);
                        const roll_center_y = R_op_r_B * Math.sin(t);
                        const dist = (i === 0) ? 0 : Math.hypot(roll_center_x - state.lastRollCenterX, roll_center_y - state.lastRollCenterY);
                        const rotationAngle = (Rrpx > 0) ? dist / Rrpx : 0;
                        state.penAngle += rotationAngle;
                        const pen_rel_x = Dpx * Math.cos(state.penAngle);
                        const pen_rel_y = Dpx * Math.sin(state.penAngle);
                        const x_coord = roll_center_x + pen_rel_x;
                        const y_coord = roll_center_y + d_sign * pen_rel_y;
                        currentCoords = new THREE.Vector3(x_coord, y_coord, 0);
                        state.lastRollCenterX = roll_center_x;
                        state.lastRollCenterY = roll_center_y;
                    } else if (ringType === 'polygon') {
                        if (Rrpx === 0) break;
                        const poly = state.poly;
                        const distPerStep = 0.5; // Fixed small step for high quality pre-calc
                        let currentX, currentY;
                        
                        if (poly.state === 'rolling_edge') {
                            const v0 = poly.vertices[poly.currentEdge];
                            const v1 = poly.vertices[(poly.currentEdge + 1) % poly.vertices.length];
                            const edgeAngle = Math.atan2(v1.y - v0.y, v1.x - v0.x);
                            const center_x = v0.x + poly.distOnEdge * Math.cos(edgeAngle) - Rrpx * Math.sin(edgeAngle);
                            const center_y = v0.y + poly.distOnEdge * Math.sin(edgeAngle) + Rrpx * Math.cos(edgeAngle);
                            const wheelAngle = edgeAngle + Math.PI / 2;
                            const local_x = Dpx * Math.cos(state.penAngle);
                            const local_y = Dpx * Math.sin(state.penAngle);
                            currentX = center_x + local_x * Math.cos(wheelAngle) - local_y * Math.sin(wheelAngle);
                            currentY = center_y + local_x * Math.sin(wheelAngle) + local_y * Math.cos(wheelAngle);
                            
                            const angleRolledThisStep = distPerStep / Rrpx;
                            state.penAngle += angleRolledThisStep;
                            poly.distOnEdge += distPerStep;
                            if (poly.distOnEdge >= poly.edgeLength) {
                                const overshootDist = poly.distOnEdge - poly.edgeLength;
                                const overshootAngle = overshootDist / Rrpx;
                                poly.state = "pivoting_corner";
                                poly.cornerT = overshootAngle;
                                poly.pivotCenter = poly.vertices[(poly.currentEdge + 1) % poly.vertices.length];
                                state.penAngle += overshootAngle;
                            }
                        } else { // Pivoting
                            const { x: pivotX, y: pivotY } = poly.pivotCenter;
                            const v0 = poly.vertices[poly.currentEdge];
                            const prevEdgeAngle = Math.atan2(pivotY - v0.y, pivotX - v0.x);
                            const startPivotAngle = prevEdgeAngle + Math.PI / 2;
                            const pivotAngle = startPivotAngle + poly.cornerT;
                            const center_x = pivotX + Rrpx * Math.cos(pivotAngle);
                            const center_y = pivotY + Rrpx * Math.sin(pivotAngle);
                            const wheelAngle = pivotAngle;
                            const local_x = Dpx * Math.cos(state.penAngle);
                            const local_y = Dpx * Math.sin(state.penAngle);
                            currentX = center_x + local_x * Math.cos(wheelAngle) - local_y * Math.sin(wheelAngle);
                            currentY = center_y + local_x * Math.sin(wheelAngle) + local_y * Math.cos(wheelAngle);
                            
                            const tStep = distPerStep / Rrpx;
                            state.penAngle += tStep;
                            poly.cornerT += tStep;
                            if (poly.cornerT >= poly.cornerAngle) {
                                const overshootAngle = poly.cornerT - poly.cornerAngle;
                                const overshootDist = overshootAngle * Rrpx; 
                                poly.state = "rolling_edge";
                                poly.currentEdge = (poly.currentEdge + 1) % poly.vertices.length;
                                poly.distOnEdge = overshootDist;
                                poly.cornerT = 0;
                            }
                        }
                        currentCoords = new THREE.Vector3(currentX, currentY, 0);
                    }
                    
                    if (currentCoords) {
                        allPoints.push(currentCoords);
                        
                        // --- Color calculation for pre-computation ---
                        if (schemeData.type === "hsv_sweep") {
                            // Hue cycles from 0.0 to < 1.0. A factor of (i/numSteps) * colorCycles ensures full cycles.
                            const hue = ((i / numSteps) * colorCycles) % 1.0;
                            currentPenColor.set(hsvToHex(hue, 0.9, 0.95));
                        } else if (schemeData.type === "palette_sweep") {
                            // Map 'i' over 'numSteps' to cycle through the palette 'colorCycles' times
                            const paletteSize = schemeData.colors.length;
                            const progress = (i / numSteps) * colorCycles; // How many full palette cycles
                            const paletteProgress = progress % 1.0; // Current progress within one palette cycle
                            
                            const idx1 = Math.floor(paletteProgress * paletteSize);
                            const idx2 = (idx1 + 1) % paletteSize;
                            const frac = (paletteProgress * paletteSize) - idx1;

                            const rgb1 = hexToRgb(schemeData.colors[idx1]);
                            const rgb2 = hexToRgb(schemeData.colors[idx2]);

                            const r = rgb1[0] * (1 - frac) + rgb2[0] * frac;
                            const g = rgb1[1] * (1 - frac) + rgb2[1] * frac;
                            const b = rgb1[2] * (1 - frac) + rgb2[2] * frac;
                            currentPenColor.set(rgbToHex(r, g, b));
                        }
                        allColors.push(currentPenColor.r, currentPenColor.g, currentPenColor.b);
                    }
                }
                
                allPointsRef.current = allPoints;
                allColorsRef.current = allColors;
                if (allPoints.length === 0) return false;
                
                currentDrawOperationRef.current = new THREE.Group();
                const geometry = new THREE.BufferGeometry();
                geometry.setFromPoints(allPoints);
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(allColors, 3));
                
                const material = new THREE.LineBasicMaterial({ vertexColors: true });
                
                const line = new THREE.Line(geometry, material);
                line.frustumCulled = false;
                
                currentDrawOperationRef.current.add(line);
                T.drawGroup.add(currentDrawOperationRef.current);
                
                let outlineGeometry;
                if (ringType === 'oblong') {
                    const curve = new THREE.EllipseCurve(0, 0, Rpx, rMinorPxValue, 0, 2 * Math.PI, false, 0);
                    outlineGeometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(100));
                } else if (ringType === 'polygon') {
                    const points = [...state.poly.vertices, state.poly.vertices[0]];
                    outlineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                } else { // Circle
                    const curve = new THREE.EllipseCurve(0, 0, Rpx, Rpx, 0, 2 * Math.PI, false, 0);
                    outlineGeometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(64));
                }
                
                if (outlineGeometry) {
                    const outline = new THREE.Line(outlineGeometry, T.outlineMaterial);
                    outline.computeLineDistances(); 
                    T.outlineGroup.add(outline);
                }
                
                return true; 
            };

            // --- REFACTORED ANIMATION LOOP (PLAYBACK) ---
            useEffect(() => {
                if (!isDrawing) {
                    if (animationFrameId.current) {
                        cancelAnimationFrame(animationFrameId.current);
                        animationFrameId.current = null;
                    }
                    if (currentDrawOperationRef.current) {
                        if (currentDrawOperationRef.current.children.length > 0) {
                            const line = currentDrawOperationRef.current.children[0];
                            if (line) {
                                // Ensure full pattern is drawn when animation stops
                                line.geometry.setDrawRange(0, maxSteps); 
                            }
                            drawHistoryRef.current.push(currentDrawOperationRef.current);
                            setCanUndo(true);
                        } else {
                            threeRef.current.drawGroup.remove(currentDrawOperationRef.current);
                        }
                        currentDrawOperationRef.current = null;
                    }
                    return; 
                }

                const T = threeRef.current;
                const state = drawState.current;
                
                const stepsPerFrame = 10 + (speedLevel * 30); // 40 (slow) to 160 (fast)

                const drawFrame = () => {
                    if (state.currentStep >= maxSteps) {
                        setIsDrawing(false); 
                        T.outlineGroup.clear(); 
                        return;
                    }

                    state.currentStep = Math.min(state.currentStep + stepsPerFrame, maxSteps);
                    
                    if (currentDrawOperationRef.current && currentDrawOperationRef.current.children.length > 0) {
                        const line = currentDrawOperationRef.current.children[0];
                        if (line) {
                            line.geometry.setDrawRange(0, state.currentStep);
                        }
                    }
                    
                    animationFrameId.current = requestAnimationFrame(drawFrame);
                };

                animationFrameId.current = requestAnimationFrame(drawFrame);

                return () => {
                    if (animationFrameId.current) {
                        cancelAnimationFrame(animationFrameId.current);
                        animationFrameId.current = null;
                    }
                };

            }, [isDrawing, speedLevel, maxSteps, R, r, d, ringType, rMinor, penColor, theme.fg, rollMode, dynamicScaleFactor]);

            // --- COLOR TRANSITION LOOP (IDLE) ---
            const colorTransitionLoop = useCallback(() => {
                if (isDrawing) {
                    if (colorTransitionTimer.current) clearTimeout(colorTransitionTimer.current);
                    colorTransitionTimer.current = null;
                    return;
                }
                
                const schemeData = COLOR_SCHEMES[selectedScheme];
                if (!schemeData || schemeData.type === "solid") {
                    if (colorTransitionTimer.current) clearTimeout(colorTransitionTimer.current);
                    colorTransitionTimer.current = null;
                    return;
                }
                
                const updateInterval = 50;
                // --- This logic is now based on steps, not time ---
                const steps = Math.max(1, COLOR_TRANSITION_STEPS / (1000 / updateInterval)); 
                const state = colorState.current;
                let newColorHex;

                if (schemeData.type === "hsv_sweep") {
                    // This hue calculation ensures a smooth transition that can eventually loop
                    state.currentHue = (state.currentHue + (1 / steps) + 1.0) % 1.0;
                    newColorHex = hsvToHex(state.currentHue, 0.9, 0.95);
                } else { // palette_sweep
                    const paletteSize = schemeData.colors.length;
                    const colorStepFraction = 1 / steps; // How much to advance in palette per interval

                    // Calculate current position within the full palette cycle
                    let currentPalettePosition = (state.paletteIndex + (state.currentRgb[0] / 255 - hexToRgb(schemeData.colors[state.paletteIndex])[0] / 255) / (hexToRgb(schemeData.colors[(state.paletteIndex + 1) % paletteSize])[0] / 255 - hexToRgb(schemeData.colors[state.paletteIndex])[0] / 255) );
                    currentPalettePosition = (currentPalettePosition + colorStepFraction * 0.1) % paletteSize; // Advance slowly

                    const idx1 = Math.floor(currentPalettePosition);
                    const idx2 = (idx1 + 1) % paletteSize;
                    const frac = currentPalettePosition - idx1;

                    const rgb1 = hexToRgb(schemeData.colors[idx1]);
                    const rgb2 = hexToRgb(schemeData.colors[idx2]);

                    const r = rgb1[0] * (1 - frac) + rgb2[0] * frac;
                    const g = rgb1[1] * (1 - frac) + rgb2[1] * frac;
                    const b = rgb1[2] * (1 - frac) + rgb2[2] * frac;

                    state.currentRgb = [r, g, b];
                    state.paletteIndex = idx1;
                    state.targetRgb = hexToRgb(schemeData.colors[idx2]);

                    newColorHex = rgbToHex(...state.currentRgb);
                }
                
                setPenColor(newColorHex); 
                colorTransitionTimer.current = setTimeout(colorTransitionLoop, updateInterval);
            }, [selectedScheme, isDrawing]);


            useEffect(() => {
                if (!isDrawing) {
                    colorTransitionTimer.current = setTimeout(colorTransitionLoop, 50);
                }
                
                return () => {
                    if (colorTransitionTimer.current) {
                        clearTimeout(colorTransitionTimer.current);
                        colorTransitionTimer.current = null;
                    }
                };
            }, [isDrawing, selectedScheme, colorTransitionLoop]);

            // --- UI HANDLERS ---
            const handleToggleDrawing = () => {
                if (isDrawing) {
                    setIsDrawing(false); 
                    threeRef.current.outlineGroup.clear(); 
                } else {
                    if (startDrawing()) {
                        setIsDrawing(true);
                    }
                }
            };

            const handleClearCanvas = () => {
                setIsDrawing(false); 
                if (colorTransitionTimer.current) clearTimeout(colorTransitionTimer.current);
                colorTransitionTimer.current = null;
                
                threeRef.current.drawGroup.clear();
                threeRef.current.outlineGroup.clear();
                
                drawHistoryRef.current.forEach(group => {
                    group.traverse(obj => {
                        if (obj.geometry) obj.geometry.dispose();
                        if (obj.material) obj.material.dispose();
                    });
                });
                drawHistoryRef.current = [];
                setCanUndo(false);
                
                allPointsRef.current = [];
                setMaxSteps(0);
                drawState.current.currentStep = 0;
            };
            
            const handleUndo = () => {
                if (isDrawing) return; 
                
                const lastDrawing = drawHistoryRef.current.pop();
                if (lastDrawing) {
                    threeRef.current.drawGroup.remove(lastDrawing);
                    lastDrawing.traverse(obj => {
                        if (obj.geometry) obj.geometry.dispose();
                        if (obj.material) obj.material.dispose();
                    });
                }
                setCanUndo(drawHistoryRef.current.length > 0);
            };
            
            const handleExport = () => {
                try {
                    threeRef.current.renderer.render(threeRef.current.scene, threeRef.current.camera);
                    const dataURL = canvasRef.current.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.download = 'sPYrograph.png';
                    link.href = dataURL;
                    link.click();
                } catch (e) {
                    console.error("Export failed:", e);
                    alert("Export failed. This may be due to browser security restrictions (e.g., tainted canvas).");
                }
            };
            
            const handleManualColorChange = (e) => {
                const newColor = e.target.value;
                setPenColor(newColor);
                colorState.current.currentRgb = hexToRgb(newColor);
                colorState.current.targetRgb = hexToRgb(newColor);
            };
            
            const updatePatternInfo = (R_teeth, r_teeth, type) => {
                if (type === 'circle') {
                    if (R_teeth === 0 || r_teeth === 0) {
                        setPatternInfo({ petals: 0, rotations: 0 });
                        return;
                    }
                    const commonDivisor = gcd(R_teeth, r_teeth);
                    const petals = R_teeth / commonDivisor;
                    const rotations = r_teeth / commonDivisor;
                    setPatternInfo({ petals: petals, rotations: rotations });
                } else {
                    setPatternInfo({ petals: 'N/A', rotations: 'N/A' });
                }
            };
            
            const handleRingChange = (e) => {
                const ringName = e.target.value;
                const ringData = GEAR_DATA.Rings[ringName] || GEAR_DATA.Special[ringName];
                let newType = 'circle', newR = 105, newRMinorValue = 0;
                
                if (ringName in GEAR_DATA.Special) {
                    newType = ringData.type;
                    if (ringData.type === 'oblong') { 
                        newR = ringData.A; 
                        newRMinorValue = ringData.B;
                    } else if (ringData.type === 'polygon') { 
                        newR = ringData.side_length;
                    }
                } else {
                    newR = ringData;
                }
                
                setR(newR);
                setRingType(newType);
                setRMinor(newRMinorValue);
                setSelectedRing(ringName);
                updatePatternInfo(newR, r, newType);
            };
            
            const handleWheelChange = (e) => {
                const wheelName = e.target.value;
                const wheelData = GEAR_DATA.Wheels[wheelName];
                if (wheelData) {
                    const newRWheel = wheelData.r;
                    setRWheel(newRWheel);
                    if (!wheelData.holes.includes(selectedHole)) {
                        const newHole = wheelData.holes[0] || 0;
                        setSelectedHole(newHole);
                        setD(newHole);
                    }
                    updatePatternInfo(R, newRWheel, ringType);
                }
                setSelectedWheel(wheelName);
            };

            const handleHoleChange = (e) => {
                const newHole = parseInt(e.target.value);
                setSelectedHole(newHole);
                setD(newHole);
            };
            
            useEffect(() => {
                updatePatternInfo(R, r, ringType);
            }, []);
            
            // --- JSX RENDER ---
            return (
                <div className="font-sans h-screen flex flex-col" style={{ backgroundColor: theme.bg, color: theme.fg }}>
                    
                    {showHelp && <HelpModal theme={theme} onClose={() => setShowHelp(false)} />}
                    
                    <div className="flex w-full flex-grow overflow-hidden">
                        {/* Control Panel */}
                        <div className="w-[300px] flex-shrink-0 p-4 overflow-y-auto relative shadow-2xl" style={{ backgroundColor: theme.bg, color: theme.fg, zIndex: 10 }}>
                            
                            <button
                                className={`absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center text-lg font-bold transform transition-transform hover:scale-110 ${theme.btn_bg}`}
                                style={{ color: theme.btn_fg }}
                                onClick={() => setShowHelp(true)}
                                title="Show Instructions"
                            >
                                ?
                            </button>
                            
                            <div className="flex justify-center mb-6">
                                {"sPYrograph".split("").map((char, i) => (
                                    <span 
                                        key={i} 
                                        className="text-2xl font-extrabold" 
                                        style={{ 
                                            color: (char === 'P' || char === 'Y') ? theme.accent : theme.fg, 
                                            padding: '0 1px',
                                            textShadow: (char === 'P' || char === 'Y') ? `0 0 8px ${theme.accent}` : 'none'
                                        }}
                                    >
                                        {char}
                                    </span>
                                ))}
                            </div>

                            {/* 1. Gear Selectors */}
                            <div className="mb-4">
                                <h3 className="text-sm font-semibold mb-3 flex items-center"><Icons.Gears /> 1. Gear Selectors</h3>
                                <label className="text-xs mt-2 block">Fixed Ring:</label>
                                <select
                                    className="w-full p-2 rounded-md text-xs appearance-none cursor-pointer border-0 ring-2 ring-transparent focus:ring-teal-400"
                                    style={{ backgroundColor: theme.trough, color: theme.fg }}
                                    value={selectedRing} onChange={handleRingChange}
                                >
                                    {ringOptions.map(option => <option key={option} value={option}>{option}</option>)}
                                </select>
                                
                                <label className="text-xs mt-2 block">Moving Wheel (r):</label>
                                <select
                                    className="w-full p-2 rounded-md text-xs appearance-none cursor-pointer border-0 ring-2 ring-transparent focus:ring-teal-400"
                                    style={{ backgroundColor: theme.trough, color: theme.fg }}
                                    value={selectedWheel} onChange={handleWheelChange}
                                >
                                    {wheelOptions.map(option => <option key={option} value={option}>{option}</option>)}
                                </select>

                                <label className="text-xs mt-2 block">Pen Hole (d):</label>
                                <select
                                    className="w-full p-2 rounded-md text-xs appearance-none cursor-pointer border-0 ring-2 ring-transparent focus:ring-teal-400"
                                    style={{ backgroundColor: theme.trough, color: theme.fg }}
                                    value={selectedHole} onChange={handleHoleChange}
                                >
                                    {availableHoles.map(hole => <option key={hole} value={hole}>{hole}</option>)}
                                </select>
                            </div>

                            {/* 2. Pattern Info */}
                            <div className="mb-4">
                                <h3 className="text-sm font-semibold mb-3 flex items-center"><Icons.Info /> 2. Pattern Info</h3>
                                <div className="p-3 rounded-md text-xs" style={{ backgroundColor: theme.trough, color: theme.fg }}>
                                    <div className="flex justify-between">
                                        <span>Petals / Points:</span>
                                        <span className="font-bold">{patternInfo.petals}</span>
                                    </div>
                                    <div className="flex justify-between mt-1">
                                        <span>Rotations to Close:</span>
                                        <span className="font-bold">{patternInfo.rotations}</span>
                                    </div>
                                    {patternInfo.petals <= 10 && patternInfo.petals > 0 && (
                                        <div className="text-center mt-2" style={{ color: theme.accent, opacity: 0.8 }}>This is a simple pattern.</div>
                                    )}
                                    {patternInfo.petals > 10 && (
                                        <div className="text-center mt-2" style={{ color: theme.accent }}>This is a complex pattern.</div>
                                    )}
                                </div>
                            </div>

                            {/* 3. Animation */}
                            <div className="mb-4">
                                <h3 className="text-sm font-semibold mb-3 flex items-center"><Icons.Animation /> 3. Animation</h3>
                                <label className="text-xs mt-2 block">Animation Speed</label>
                                <input
                                    type="range" min="1" max="5" step="1"
                                    value={speedLevel} onChange={(e) => setSpeedLevel(parseInt(e.target.value))}
                                    className="w-full h-2 rounded-lg appearance-none cursor-pointer"
                                    style={{ background: theme.trough, accentColor: theme.accent }}
                                />
                            </div>

                            {/* 4. Actions */}
                            <div className="mb-4">
                                <h3 className="text-sm font-semibold mb-3 flex items-center"><Icons.Actions /> 4. Actions</h3>
                                
                                <div className="flex space-x-2">
                                    <button
                                        className={`w-2/3 p-3 rounded-md text-sm font-semibold text-white transition-transform transform hover:scale-105 ${isDrawing ? theme.danger_bg : theme.success_bg}`}
                                        style={{ color: theme.btn_fg }}
                                        onClick={handleToggleDrawing}
                                    >
                                        {isDrawing ? 'Stop Drawing' : 'Draw Pattern'}
                                    </button>
                                    <button
                                        className={`w-1/3 p-3 rounded-md text-sm font-semibold flex items-center justify-center transition-transform transform hover:scale-105 ${theme.btn_bg} ${!canUndo || isDrawing ? 'opacity-50 cursor-not-allowed' : ''}`}
                                        style={{ color: theme.btn_fg }}
                                        onClick={handleUndo}
                                        disabled={!canUndo || isDrawing}
                                    >
                                        <Icons.Undo />
                                    </button>
                                </div>
                                
                                <button
                                    className={`w-full p-2 mt-2 rounded-md text-xs transform transition-transform hover:scale-105 ${theme.btn_bg}`}
                                    style={{ color: theme.btn_fg }}
                                    onClick={handleClearCanvas}
                                >
                                    Clear Canvas
                                </button>
                                <button
                                    className={`w-full p-2 mt-2 rounded-md text-xs transform transition-transform hover:scale-105 ${theme.btn_bg}`}
                                    style={{ color: theme.btn_fg }}
                                    onClick={handleExport}
                                >
                                    Export as PNG
                                </button>
                            </div>

                            {/* 5. Pen & Color Options */}
                            <div className="mb-4">
                                <h3 className="text-sm font-semibold mb-3 flex items-center"><Icons.Color /> 5. Pen & Color Options</h3>
                                
                                <label className="text-xs mt-2 block">Color Scheme:</label>
                                <select
                                    className="w-full p-2 rounded-md text-xs appearance-none cursor-pointer border-0 ring-2 ring-transparent focus:ring-teal-400"
                                    style={{ backgroundColor: theme.trough, color: theme.fg }}
                                    value={selectedScheme} onChange={(e) => setSelectedScheme(e.target.value)}
                                >
                                    {Object.keys(COLOR_SCHEMES).map(scheme => <option key={scheme} value={scheme}>{scheme}</option>)}
                                </select>
                                
                                {/* --- REMOVED: Color Speed Slider --- */}
                                
                                <label htmlFor="manual-color" className={`w-full p-2 mt-3 rounded-md text-xs flex items-center justify-between ${selectedScheme !== "Solid (Manual)" ? 'opacity-50' : ''}`}
                                    style={{ backgroundColor: theme.trough, color: theme.fg }}
                                >
                                    Choose Pen Color
                                    <input
                                        id="manual-color"
                                        type="color"
                                        value={penColor}
                                        onChange={handleManualColorChange}
                                        disabled={selectedScheme !== "Solid (Manual)"}
                                        className={`p-0 border-0 ${selectedScheme !== "Solid (Manual)" ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                                    />
                                </label>
                            </div>

                            {/* 6. Advanced Settings */}
                            <div>
                                <h3 className="text-sm font-semibold mb-3 flex items-center"><Icons.Settings /> 6. Advanced Settings</h3>
                                
                                <label className="text-xs mt-2 block">Roll Mode:</label>
                                <div className="flex w-full mt-1 rounded-md" style={{ backgroundColor: theme.trough }}>
                                    <button
                                        className={`w-1/2 p-1 rounded-md text-xs font-semibold ${rollMode === 'hypo' ? theme.btn_bg : ''}`}
                                        style={{ color: rollMode === 'hypo' ? theme.btn_fg : theme.fg }}
                                        onClick={() => setRollMode('hypo')}
                                    >
                                        Inside Roll
                                    </button>
                                    <button
                                        className={`w-1/2 p-1 rounded-md text-xs font-semibold ${rollMode === 'epi' ? theme.btn_bg : ''}`}
                                        style={{ color: rollMode === 'epi' ? theme.btn_fg : theme.fg }}
                                        onClick={() => setRollMode('epi')}
                                    >
                                        Outside Roll
                                    </button>
                                </div>
                                
                                <button
                                    className={`w-full p-2 mt-4 rounded-md text-xs transform transition-transform hover:scale-105 ${theme.btn_bg}`}
                                    style={{ color: theme.btn_fg }}
                                    onClick={() => setThemeName(themeName === 'dark' ? 'light' : 'dark')}
                                >
                                    Toggle Dark/Light Mode
                                </button>
                            </div>
                        </div>

                        {/* Canvas Area */}
                        <div className="flex-grow flex justify-center items-center shadow-inner" style={{ backgroundColor: theme.canvas_bg }}>
                            <canvas ref={canvasRef} width={CANVAS_WIDTH} height={CANVAS_HEIGHT} className="shadow-2xl" />
                        </div>
                    </div>
                </div>
            );
        };

        // --- Mount the App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpiroApp />);

    </script>
</body>
</html>
