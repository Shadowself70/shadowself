<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shadowself | Updates</title>
  <meta
    name="description"
    content="Read updates, random thoughts, development notes, and short dispatches from Shadowself."
  >
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/data/site-data.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body class="page" data-page="updates">
  <div class="site-shell">
    <header class="interior-header">
      <a class="home-mark" href="index.html" aria-label="Return to Shadowself home">
        <img class="home-mark-art" src="assets/logos/shadowself-logo-small-web.png" alt="">
      </a>

      <div class="page-heading">
        <p class="eyebrow">Updates &amp; Random Thoughts</p>
      </div>

      <div class="header-actions">
        <button class="subpage-art-control" type="button" data-open-modal="ai-disclosure-modal" aria-label="AI Disclosure">
          <img class="subpage-action-art" src="assets/images/site/ai-disclosure-button-alpha.svg" alt="">
        </button>
        <a class="subpage-art-link" href="media.html" aria-label="Media">
          <img class="subpage-action-art" src="assets/logos/media-logo-small-web.png" alt="Media">
        </a>
        <a class="subpage-art-link" href="games-software.html" aria-label="Games and software">
          <img class="subpage-action-art" src="assets/logos/games-software-logo-small-web.png" alt="Games and software">
        </a>
      </div>
    </header>

    <main class="page-main">
      <div class="page-hero-logo-wrap">
        <div
          class="page-hero-logo updates-heading-logo"
          role="img"
          aria-label="Updates logo"
        ></div>
      </div>
      <section class="section-block">
        <div id="updates-feed" class="updates-feed"></div>
      </section>
    </main>
  </div>
</body>
</html>
