<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shadowself | Games &amp; Software</title>
  <meta
    name="description"
    content="Explore Shadowself games, software, tools, and interactive experiments."
  >
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/data/site-data.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body class="page" data-page="games">
  <div class="site-shell">
    <header class="interior-header">
      <a class="home-mark" href="index.html" aria-label="Return to Shadowself home">
        <img class="home-mark-art" src="assets/logos/shadowself-logo-small-web.png" alt="">
      </a>

      <div class="page-heading">
        <p class="eyebrow">Games &amp; Software</p>
      </div>

      <div class="header-actions">
        <button class="subpage-art-control subpage-art-control-tall" type="button" data-open-modal="ai-disclosure-modal" aria-label="AI Disclosure">
          <img class="subpage-action-art" src="assets/logos/ai-disclosure-button-web.png" alt="">
        </button>
        <a class="subpage-art-link" href="media.html" aria-label="Media">
          <img class="subpage-action-art" src="assets/logos/media-logo-small-web.png" alt="Media">
        </a>
        <a class="subpage-art-link subpage-art-link-tall" href="updates.html" aria-label="Updates and brainfarts">
          <img class="subpage-action-art" src="assets/logos/updates-logo-button-web.png" alt="">
        </a>
      </div>
    </header>

    <main class="page-main">
      <div class="page-hero-logo-wrap">
        <div
          class="page-hero-logo games-heading-logo"
          role="img"
          aria-label="Games and software logo"
        ></div>
      </div>
      <section class="section-block">
        <div id="project-grid" class="project-grid"></div>
      </section>
    </main>
  </div>
</body>
</html>
